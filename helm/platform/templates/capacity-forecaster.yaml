{{- if .Values.capacityForecaster.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capacity-forecaster
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels: { app: capacity-forecaster }
  template:
    metadata:
      labels: { app: capacity-forecaster }
    spec:
      containers:
        - name: forecaster
          image: {{ .Values.capacityForecaster.image }}
          command: ["bash", "-c"]
          args:
            - pip install --quiet -r /app/requirements.txt && uvicorn main:app --app-dir /app --host 0.0.0.0 --port 8080
          env:
            - name: PROM_URL
              value: {{ .Values.prometheusUrl }}
            - name: THRESHOLD
              value: {{ .Values.capacityForecaster.threshold | quote }}
            - name: HORIZON_HOURS
              value: {{ .Values.capacityForecaster.horizonHours | quote }}
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: code
              mountPath: /app
          resources:
            requests: { cpu: 200m, memory: 600Mi }
            limits: { memory: 1200Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 120 # prophet install is slow
            periodSeconds: 20
      volumes:
        - name: code
          configMap:
            name: argus-forecaster-code
---
apiVersion: v1
kind: Service
metadata:
  name: capacity-forecaster
  namespace: aiops
  labels: { app: capacity-forecaster }
spec:
  selector: { app: capacity-forecaster }
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: capacity-forecaster
  namespace: aiops
spec:
  selector:
    matchLabels: { app: capacity-forecaster }
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      honorLabels: true
{{- end }}
