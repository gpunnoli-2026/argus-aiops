apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow
  namespace: mlflow
  {{- if .Values.mlflowRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.mlflowRoleArn }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: mlflow
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.mlflow.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.mlflow.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  strategy:
    type: Recreate # single PVC, RWO
  selector:
    matchLabels: { app: mlflow }
  template:
    metadata:
      labels: { app: mlflow }
    spec:
      serviceAccountName: mlflow
      containers:
        - name: mlflow
          image: {{ .Values.mlflow.image }}
          command: ["bash", "-c"]
          args:
            - |
              pip install --quiet boto3 &&
              mlflow server \
                --backend-store-uri sqlite:////data/mlflow.db \
                --serve-artifacts \
                {{- if .Values.artifactBucket }}
                --artifacts-destination s3://{{ .Values.artifactBucket }}/mlartifacts \
                {{- else }}
                --artifacts-destination /data/mlartifacts \
                {{- end }}
                --host 0.0.0.0 --port 5000 \
                --workers 2
          env:
            - name: AWS_REGION
              value: {{ .Values.awsRegion }}
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 1200Mi }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  selector: { app: mlflow }
  ports:
    - por