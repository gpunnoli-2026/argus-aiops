# kube-prometheus-stack values — sized for a small 2-4 node sandbox cluster
grafana:
  adminPassword: argus-admin # sandbox only; rotate if cluster is ever long-lived
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 256Mi }

prometheus:
  prometheusSpec:
    retention: 2d
    resources:
      requests: { cpu: 200m, memory: 750Mi }
      limits: { memory: 1500Mi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Pick up PrometheusRule/ServiceMonitor resources from any namespace
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits: { memory: 128Mi }
  config:
    route:
      receiver: argus-correlator
      group_by: ["alertname", "service"]
      group_wait: 15s
      group_interval: 1m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          